<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平行世界 - 灵魂塑造</title>
    <style>
        :root {
            --bg-warm: #fdf6ec;      
            --card-white: #ffffff;
            --accent-pink: #ffefef;   
            --accent-yellow: #fdf9e1; 
            --text-black: #2d3436;    
            --soft-gray: #a0a0a0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'PingFang SC', sans-serif; 
            background-color: var(--bg-warm);
            color: var(--text-black);
            overflow: hidden;
        }

        .view-section {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

        /* 通用卡片样式 */
        .game-card {
            background: white; padding: 35px; border-radius: 40px;
            width: 85%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(180, 160, 140, 0.1);
            text-align: center;
        }

        /* 属性加点样式 */
        .stat-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px; background: var(--bg-warm);
            padding: 8px 15px; border-radius: 20px;
        }
        .stat-label { font-size: 15px; font-weight: bold; }
        .stat-controls { display: flex; align-items: center; gap: 15px; }
        .stat-btn {
            width: 30px; height: 30px; border-radius: 50%; border: none;
            background: white; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* MBTI 网格 */
        .mbti-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            margin-top: 20px;
        }
        .mbti-item {
            padding: 10px 5px; border-radius: 12px; border: 1px solid var(--accent-pink);
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .mbti-item:hover { background: var(--accent-yellow); }
        .mbti-item.selected { background: var(--text-black); color: white; }

        .btn-next {
            width: 100%; padding: 15px; background: var(--text-black);
            color: white; border: none; border-radius: 50px;
            margin-top: 25px; cursor: pointer; font-size: 16px;
        }

        /* 动画逻辑同前 */
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
    </style>
</head>
<body>

    <audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

    <section id="cover-view" class="view-section" onclick="showMenu()">
        <div style="font-size: 80px; animation: float 3s infinite;">🏠</div>
        <div style="margin-top: 30px; letter-spacing: 3px; color: #888;">欢迎来到属于你的平行世界</div>
        <p style="font-size: 12px; color: #bbb;">- 点击开启悠闲时光 -</p>
    </section>

    <section id="menu-view" class="view-section hidden">
        <div class="game-card">
            <h2 style="font-weight: 300;">时光驿站</h2>
            <button class="btn-next" style="background:none; color:black; border:1px solid black" onclick="showCreate()">新 游 戏</button>
            <button class="btn-next" style="background:none; color:gray; border:1px solid #ddd" onclick="alert('记忆消失在风中...')">寻找存档</button>
        </div>
    </section>

    <section id="create-view" class="view-section hidden">
        <div class="game-card">
            <h3>基础设定</h3>
            <input type="text" id="pName" placeholder="怎么称呼你？" style="width:90%; padding:15px; border:none; background:var(--bg-warm); border-radius:15px; margin-bottom:15px;">
            <select id="pGender" style="width:100%; padding:15px; border:none; background:var(--bg-warm); border-radius:15px;">
                <option>男孩</option>
                <option>女孩</option>
            </select>
            <button class="btn-next" onclick="showStats()">下一步：分配天赋</button>
        </div>
    </section>

    <section id="stats-view" class="view-section hidden">
        <div class="game-card">
            <h3>天赋分配</h3>
            <p style="font-size: 14px; color: #888;">剩余点数: <span id="points" style="color:var(--text-black); font-weight:bold;">20</span></p>
            
            <div id="stat-container">
                </div>

            <button class="btn-next" onclick="showMBTI()">下一步：性格印记</button>
        </div>
    </section>

    <section id="mbti-view" class="view-section hidden">
        <div class="game-card">
            <h3>性格印记</h3>
            <p style="font-size: 13px; color: #888;">这决定了你与世界的相处方式</p>
            <div class="mbti-grid" id="mbtiGrid">
                </div>
            <button class="btn-next" onclick="finishAll()">开启人生之旅</button>
        </div>
    </section>

    <script>
        let points = 20;
        const stats = { "美貌值": 0, "体力值": 0, "金币值": 0, "声望值": 0, "学习值": 0, "摆烂值": 0 };
        const mbtis = ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
        let selectedMBTI = "";

        // 视图切换
        function switchView(from, to) {
            document.getElementById(from).classList.add('hidden');
            document.getElementById(to).classList.remove('hidden');
        }

        function showMenu() { document.getElementById('bgm').play(); switchView('cover-view', 'menu-view'); }
        function showCreate() { switchView('menu-view', 'create-view'); }
        
        // 生成属性界面
        function showStats() {
            const container = document.getElementById('stat-container');
            container.innerHTML = Object.keys(stats).map(s => `
                <div class="stat-row">
                    <span class="stat-label">${s}</span>
                    <div class="stat-controls">
                        <button class="stat-btn" onclick="updateStat('${s}', -1)">-</button>
                        <span id="val-${s}">${stats[s]}</span>
                        <button class="stat-btn" onclick="updateStat('${s}', 1)">+</button>
                    </div>
                </div>
            `).join('');
            switchView('create-view', 'stats-view');
        }

        function updateStat(name, change) {
            if (change > 0 && points > 0) {
                stats[name]++; points--;
            } else if (change < 0 && stats[name] > 0) {
                stats[name]--; points++;
            }
            document.getElementById(`val-${name}`).innerText = stats[name];
            document.getElementById(`points`).innerText = points;
        }

        // 生成MBTI界面
        function showMBTI() {
            const grid = document.getElementById('mbtiGrid');
            grid.innerHTML = mbtis.map(m => `<div class="mbti-item" onclick="selectMBTI(this, '${m}')">${m}</div>`).join('');
            switchView('stats-view', 'mbti-view');
        }

        function selectMBTI(el, m) {
            document.querySelectorAll('.mbti-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedMBTI = m;
        }

        function finishAll() {
            const name = document.getElementById('pName').value || '无名氏';
            if(!selectedMBTI) { alert("请选择你的性格印记"); return; }
            alert(`✨ 塑造完成！\n\n你好，${selectedMBTI}人格的${name}。\n你的新生活即将从这间小屋开始...`);
        }
    </script>
</body>
</html>
