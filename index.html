<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖心生活模拟 - 角色创建</title>
    <style>
        /* 定义你的专属暖色调 */
        :root {
            --bg-warm: #fdf6ec;      /* 米色背景 */
            --card-white: #ffffff;
            --accent-pink: #ffefef;   /* 暖粉色 */
            --accent-yellow: #fdf9e1; /* 暖黄色 */
            --text-black: #2d3436;    /* 深咖黑，比纯黑更柔和 */
            --primary-border: #e8e0d5; 
        }

        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: var(--bg-warm); 
            color: var(--text-black);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { 
            background: var(--card-white); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(180, 160, 140, 0.1); 
            width: 100%; 
            max-width: 420px;
            border: 1px solid var(--primary-border);
        }

        h2 { 
            text-align: center; 
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* 预览框：使用暖黄色背景 */
        .avatar-preview { 
            width: 100px;
            height: 100px;
            background: var(--accent-yellow); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 50px; 
            margin: 0 auto 30px;
            border: 4px solid var(--accent-pink);
        }

        .input-group { margin-bottom: 20px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #888;
        }

        /* 输入框：米色底，黑色字 */
        input, select { 
            width: 100%; 
            padding: 14px; 
            background: var(--bg-warm);
            border: 1px solid transparent;
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 16px;
            color: var(--text-black);
            transition: all 0.3s ease;
        }

        input:focus { 
            outline: none;
            background: var(--card-white);
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 4px var(--accent-pink);
        }

        /* 按钮：深色背景，白色文字 */
        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: var(--text-black); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .btn-submit:hover { opacity: 0.8; }

    </style>
</head>
<body>

<div class="container">
    <h2>新 的 旅 程</h2>
    
    <div class="avatar-preview" id="charPic">👶</div>

    <div class="input-group">
        <label>姓名</label>
        <input type="text" id="name" placeholder="为自己起个名字...">
    </div>

    <div class="input-group">
        <label>性别</label>
        <select id="gender">
            <option value="男孩">男孩</option>
            <option value="女孩">女孩</option>
            <option value="多元">其他</option>
        </select>
    </div>

    <div class="input-group">
        <label>初始年龄</label>
        <input type="number" id="age" value="0" min="0">
    </div>

    <div class="input-group">
        <label>选择外形</label>
        <select id="look" onchange="document.getElementById('charPic').innerText = this.value">
            <option value="👶">初生婴儿</option>
            <option value="👦">活泼男孩</option>
            <option value="👧">可爱女孩</option>
            <option value="🧑">职场青年</option>
            <option value="🐱">灵魂伴侣(猫?)</option>
        </select>
    </div>

    <button class="btn-submit" onclick="startLife()">开启模拟</button>
</div>

<script>
    function startLife() {
        const name = document.getElementById('name').value || '无名小卒';
        alert(`✨ 欢迎来到这个世界，${name}！`);
        // 下一步：进入属性点分配或第一天剧情
    }
</script>

</body>
</html>
